<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>待办事项 - 混合工作流示例</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>待办事项</h1>
            <p class="subtitle">混合工作流示例项目</p>
        </header>
        
        <main>
            <div class="input-section">
                <input type="text" id="todoInput" placeholder="添加新的待办事项..." autofocus>
                <button id="addBtn">添加</button>
            </div>
            
            <div class="filter-section">
                <button class="filter-btn active" data-filter="all">全部</button>
                <button class="filter-btn" data-filter="active">未完成</button>
                <button class="filter-btn" data-filter="completed">已完成</button>
            </div>
            
            <ul id="todoList" class="todo-list">
                <!-- 待办事项将通过JavaScript动态添加 -->
            </ul>
            
            <div class="stats">
                <span id="itemCount">0 个项目</span>
                <button id="clearCompleted">清除已完成</button>
            </div>
        </main>
        
        <footer>
            <p>使用混合工作流开发 | <a href="https://github.com/your-username/hybrid-workflow-skills" target="_blank">GitHub</a></p>
        </footer>
    </div>
    
    <script src="js/app.js"></script>
</body>
</html>
